<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Real-time Weather</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="weather-container">
        <header class="search-box">
            <input type="text" id="city-input" placeholder="Enter City Name...">
            <button id="search-btn">Search</button>
        </header>

        <div class="weather-card" id="weather-info" style="display: none;">
            <div class="main-info">
                <h1 id="city-name">Mumbai</h1>
                <p id="description">Sunny</p>
                <div class="temp-display">
                    <span id="temp">28</span>°C
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <span>Humidity</span>
                    <strong id="humidity">60%</strong>
                </div>
                <div class="detail-item">
                    <span>Wind Speed</span>
                    <strong id="wind">12 km/h</strong>
                </div>
                <div class="detail-item">
                    <span>Pressure</span>
                    <strong id="pressure">1012 hPa</strong>
                </div>
            </div>
        </div>
    </div>

    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
